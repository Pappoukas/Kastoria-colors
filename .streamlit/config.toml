## ПЂВџвЂњВ¦ Data Format

The app reads `color_summary_batch.xlsx` with three sheets:
- **Summary** ОІв‚¬вЂќ 1 row per image, 5 dominant colors with hex + % + name
- **Clusters** ОІв‚¬вЂќ K-means color clusters per image (R/G/B/H/S/V/L/a/b)
- **Statistics** ОІв‚¬вЂќ Per-channel descriptive stats (RGB / HSV / Lab / LCH)

