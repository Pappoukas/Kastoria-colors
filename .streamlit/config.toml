# ПЂВџВЋВЁ Kastoria О’В· Color Intelligence Dashboard

A professional Streamlit web app that analyzes color profiles from TripAdvisor visitor photos of Kastoria's monuments.

## ПЂВџвЂњВЉ Features

| Tab | Visualizations |
|-----|---------------|
| **Summary** | Color frequency bar chart (Top 10 overall / Top 5 per monument), Dominant colors pie chart, Monument О“вЂ” Color heatmap |
| **Clusters** | Brightness vs Saturation scatter plot, Color profile bubble chart, Coverage treemap |
| **Statistics** | Channel distributions (violin plots), Mean values per monument, RGB radar chart, Descriptive stats table |

## ПЂВџВљв‚¬ Deploy to Streamlit Cloud

1. **Fork / push this repo** to your GitHub account.
2. Place `color_summary_batch.xlsx` in the **repo root**.
3. Go to [share.streamlit.io](https://share.streamlit.io) ОІвЂ вЂ™ **New app**.
4. Select your repo, branch `main`, and main file `app.py`.
5. Click **Deploy** ОІв‚¬вЂќ done!

